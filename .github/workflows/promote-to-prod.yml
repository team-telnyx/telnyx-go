name: Promote to Prod

# Promotes generated SDK code from this staging repo to the production repo.
#
# Flow:
#   1. stlc-generate.yml pushes generated code to staging main (unchanged)
#   2. This workflow triggers on push to main
#   3. Clones the prod repo, checks out its `next` branch
#   4. Syncs the staging tree into prod's `next` (full replacement)
#   5. Restores prod-owned files that differ from staging
#   6. Commits with a Release-As footer and pushes to `next`
#   7. Prod's release-please.yml (triggered on `next` push) creates a release PR
#      → auto-merge → tag → Go module proxy picks up tag = publish
#
# This replaces the Stainless SaaS mirror that previously synced
# stainless-sdks/telnyx-go → team-telnyx/telnyx-go.
#
# Go publishes via Git tags — the Go module proxy (proxy.golang.org)
# automatically picks up new tags. No explicit publish workflow needed.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: promote-to-prod
  cancel-in-progress: false

jobs:
  promote:
    if: github.repository == 'team-telnyx/telnyx-go-staging'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout staging
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.SDK_WRITE_TOKEN }}

      - name: Read Release-As version from prod manifest
        id: version
        env:
          GH_TOKEN: ${{ secrets.SDK_WRITE_TOKEN }}
        run: |
          set -euo pipefail
          VERSION=""

          # Primary: read the current released version from PROD main's manifest.
          # This is the source of truth — prod main reflects the last successful
          # release. We bump minor (X.Y.Z → X.(Y+1).0) to compute the next version.
          # Staging history can be stale (old Release-As footers persist), leading
          # to duplicate version collisions.
          PROD_MANIFEST=$(gh api "repos/team-telnyx/telnyx-go/contents/.release-please-manifest.json?ref=main" --jq '.content' 2>/dev/null | base64 -d 2>/dev/null || true)
          CUR=$(echo "$PROD_MANIFEST" | jq -r '.["."] // empty' 2>/dev/null || true)
          if [ -n "$CUR" ] && printf '%s' "$CUR" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            VERSION=$(printf '%s' "$CUR" | awk -F. '{printf "%d.%d.0", $1, $2+1}')
            echo "Read prod main manifest: $CUR → next (minor bump) $VERSION"
          fi

          # Fallback: read Release-As from staging history (last 50 commits)
          if [ -z "$VERSION" ]; then
            for commit in $(git rev-list HEAD --max-count=50); do
              BODY=$(git log -1 --format=%b "$commit")
              RA=$(echo "$BODY" | grep -oP 'Release-As:\s*\K[\d.]+' || true)
              if [ -n "$RA" ]; then
                VERSION="$RA"
                break
              fi
            done
            [ -n "$VERSION" ] && echo "Fallback: read Release-As from staging history: $VERSION"
          fi

          # Fallback: read from staging manifest
          if [ -z "$VERSION" ]; then
            VERSION=$(jq -r '.["."] // empty' .release-please-manifest.json 2>/dev/null || true)
            [ -n "$VERSION" ] && echo "Fallback: read from staging manifest: $VERSION"
          fi

          # Fallback: read from internal/version.go
          if [ -z "$VERSION" ]; then
            VERSION=$(grep 'PackageVersion' internal/version.go | head -1 | sed 's/.*"\(.*\)".*/\1/' || true)
            [ -n "$VERSION" ] && echo "Fallback: read from version.go: $VERSION"
          fi

          if [ -z "$VERSION" ]; then
            echo "::warning::Could not determine version; skipping promote"
            echo "has_version=false" >> "$GITHUB_OUTPUT"
          else
            echo "version=$VERSION" >> "$GITHUB_OUTPUT"
            echo "has_version=true" >> "$GITHUB_OUTPUT"
            echo "Next version: $VERSION"
          fi

      - name: Clone prod repo
        if: steps.version.outputs.has_version == 'true'
        env:
          GH_TOKEN: ${{ secrets.SDK_WRITE_TOKEN }}
        run: |
          git clone https://x-access-token:${GH_TOKEN}@github.com/team-telnyx/telnyx-go.git prod-repo
          cd prod-repo
          git checkout next
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Sync staging tree → prod next
        if: steps.version.outputs.has_version == 'true'
        working-directory: prod-repo
        run: |
          # Remove all tracked files from prod's working tree
          git rm -rf . 2>/dev/null || true

          # Copy entire staging tree into prod (excluding .git and prod-repo itself)
          rsync -a --exclude='.git' --exclude='prod-repo' "$GITHUB_WORKSPACE/" .

          # ── Restore prod-owned files ──────────────────────────────────
          #
          # These files exist on both staging and prod but have DIFFERENT
          # content. The staging version is tailored for the staging repo
          # (different triggers, runners, actions, config). The prod version
          # must be preserved as-is.
          #
          # Key differences:
          #   release-please.yml: staging = GitHub Action, triggers on push to main;
          #                       prod = two-phase CLI, triggers on push to next + main
          #   ci.yml:             staging = ubuntu-latest, simpler jobs;
          #                       prod = depot runner, OIDC upload-artifact logic
          #   release-please-config.json: staging has automerge:true, create-releases.yml in extra-files;
          #                               prod does not
          #   .release-please-manifest.json: staging has 4.106.0; prod main has 4.81.1
          #   lib/*.go:           custom Go code maintained on prod (webhook verification,
          #                       WebSocket, speech-to-text, text-to-speech). These are in
          #                       stlc-generate.yml PRESERVE_PATHS but restored from prod
          #                       to be safe.
          #   go.mod / go.sum:    module definition and dependency checksums.
          #                       Restored from prod main to avoid dependency drift.
          #
          # Strategy: restore from prod's `main` branch (the release branch).
          # The `next` branch gets overwritten with staging content on each promote,
          # so restoring from `next` gives stale/staging versions — not the latest
          # prod fixes.
          git fetch origin main:refs/remotes/origin/main 2>/dev/null || true

          git checkout origin/main -- \
            .github/workflows/release-please.yml \
            .github/workflows/ci.yml \
            release-please-config.json \
            .release-please-manifest.json \
            lib/webhook_verification.go \
            lib/webhook_verification_test.go \
            lib/websocket.go \
            lib/speech_to_text_ws.go \
            lib/speech_to_text_ws_test.go \
            lib/text_to_speech_ws.go \
            lib/text_to_speech_ws_test.go \
            go.mod \
            go.sum \
            2>/dev/null || true

      - name: Commit and push to prod next
        if: steps.version.outputs.has_version == 'true'
        working-directory: prod-repo
        env:
          NEXT_VERSION: ${{ steps.version.outputs.version }}
        run: |
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to promote — prod next is already up to date"
            exit 0
          fi

          git commit -m "chore: promote from staging ${GITHUB_SHA:0:7}" -m "Release-As: ${NEXT_VERSION}"
          git push origin next

          echo "✅ Promoted to prod next with Release-As: ${NEXT_VERSION}"
